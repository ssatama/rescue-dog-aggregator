name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_rescue_dogs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install -r requirements.txt
            pip install pytest pytest-cov pytest-mock pytest-asyncio black isort flake8
          fi

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            if pg_isready -h localhost -p 5432; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... attempt $i/10"
            sleep 2
          done

      - name: Setup test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE test_rescue_dogs;" || true
          psql -h localhost -U postgres -d test_rescue_dogs -c "GRANT ALL PRIVILEGES ON DATABASE test_rescue_dogs TO postgres;" || true
          psql -h localhost -U postgres -d test_rescue_dogs -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO postgres;" || true
          psql -h localhost -U postgres -d test_rescue_dogs -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO postgres;" || true

      - name: Initialize database schema
        env:
          TESTING: "true"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_rescue_dogs
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          from database.db_setup import initialize_database
          conn = initialize_database()
          if conn:
              print('Database schema initialized successfully')
              conn.close()
          else:
              print('Database initialization failed')
              exit(1)
          " || echo "Database initialization completed or already initialized"

      - name: Diagnose test discovery
        env:
          TESTING: "true"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_rescue_dogs
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "=== CI DIAGNOSTIC INFORMATION ==="
          echo "Python version: $(python --version)"
          echo "Current directory: $(pwd)"
          echo "TESTING env var: $TESTING"
          echo "PYTHONPATH: $PYTHONPATH"
          echo ""
          echo "=== TEST COLLECTION COMPARISON ==="
          echo "All tests count:"
          python -m pytest tests/ --collect-only -q | grep -c "test session starts\|<Module\|FAILED\|ERROR" || python -m pytest tests/ --collect-only -q | wc -l
          
          echo ""
          echo "Filtered tests count (not browser and not complex_setup):"
          python -m pytest tests/ -m "not browser and not complex_setup" --collect-only -q | grep -c "test session starts\|<Module\|FAILED\|ERROR" || python -m pytest tests/ -m "not browser and not complex_setup" --collect-only -q | wc -l
          
          echo ""
          echo "What tests are being excluded by our markers?"
          echo "Tests marked as 'browser':"
          python -m pytest tests/ -m "browser" --collect-only -q | wc -l || echo "No browser tests found"
          
          echo "Tests marked as 'complex_setup':"
          python -m pytest tests/ -m "complex_setup" --collect-only -q | wc -l || echo "No complex_setup tests found"
          
          echo ""
          echo "=== DETAILED TEST COLLECTION ==="
          echo "First 20 collected tests (all):"
          python -m pytest tests/ --collect-only -q | head -20
          
          echo ""
          echo "First 20 collected tests (filtered):"
          python -m pytest tests/ -m "not browser and not complex_setup" --collect-only -q | head -20
          
          echo ""
          echo "=== PYTEST MARKERS CHECK ==="
          echo "Available markers in pytest.ini:"
          cat pytest.ini | grep -A 20 "markers ="
          
          echo ""
          echo "=== TEST FILES WITH MARKERS ==="
          echo "Files containing 'browser' marker:"
          grep -r "@pytest.mark.browser" tests/ || echo "No files with browser marker found"
          
          echo "Files containing 'complex_setup' marker:"
          grep -r "@pytest.mark.complex_setup" tests/ || echo "No files with complex_setup marker found"
          
          echo ""
          echo "=== EXACT TEST COUNTS ==="
          echo "Total tests without filter:"
          python -m pytest tests/ --collect-only -q | wc -l
          
          echo "Tests with browser marker:"
          python -m pytest tests/ -m "browser" --collect-only -q | wc -l
          
          echo "Tests with complex_setup marker:"
          python -m pytest tests/ -m "complex_setup" --collect-only -q | wc -l
          
          echo "Tests with browser OR complex_setup:"
          python -m pytest tests/ -m "browser or complex_setup" --collect-only -q | wc -l
          
          echo "Tests after excluding browser and complex_setup:"
          python -m pytest tests/ -m "not browser and not complex_setup" --collect-only -q | wc -l
          
          echo ""
          echo "=== SAMPLING ACTUAL COLLECTED TESTS ==="
          echo "Sample of tests being collected (first 10):"
          python -m pytest tests/ -m "not browser and not complex_setup" --collect-only -q | head -10
          
          echo ""
          echo "Sample of tests being excluded (first 10):"
          python -m pytest tests/ -m "browser or complex_setup" --collect-only -q | head -10
          
          echo ""
          echo "=== PYTEST WARNINGS AND ERRORS ==="
          echo "Running collection with warnings enabled:"
          python -m pytest tests/ -m "not browser and not complex_setup" --collect-only -v --tb=short 2>&1 | grep -E "(WARNING|ERROR|FAILED|::)" | head -20

      - name: Run backend tests
        env:
          TESTING: "true"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_rescue_dogs
          DB_USER: postgres
          DB_PASSWORD: postgres
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/ -m "not browser and not complex_setup" -v

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Create .env.example if missing
        run: |
          if [ ! -f .env.example ]; then
            echo "# Environment variables for development" > .env.example
            echo "NEXT_PUBLIC_API_URL=http://localhost:8000" >> .env.example
            echo "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=dy8y3boog" >> .env.example
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dy8y3boog
          CI: true
          NODE_ENV: test
        run: npm test -- --watchAll=false --passWithNoTests --silent

  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install -r requirements.txt
          fi

      - name: Check Python code formatting with Black
        run: |
          if [ -f pyproject.toml ]; then
            black --check --diff .
          else
            black --check --diff --line-length=200 .
          fi
        continue-on-error: false

      - name: Check Python imports with isort
        run: |
          if [ -f pyproject.toml ]; then
            isort --check-only --diff .
          else
            isort --check-only --diff --line-length=200 .
          fi
        continue-on-error: false

      - name: Lint Python code with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --exit-zero --statistics

      - name: Type check with mypy (optional)
        run: |
          mypy --install-types --non-interactive --ignore-missing-imports . || true

      - name: Set up Node.js for frontend linting
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend code
        working-directory: ./frontend
        run: npm run lint || echo "Frontend linting issues found. Run 'npm run lint' locally to check."
